<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#F3F4F6;color:#111;font-size:14px}
input,select,button,textarea{font-family:inherit;font-size:13px}
input,select{padding:6px 10px;border:1px solid #D1D5DB;border-radius:8px;outline:none;background:#fff}
input:focus,select:focus{border-color:#6366F1}
button{padding:6px 14px;border-radius:8px;border:1px solid #D1D5DB;background:#fff;cursor:pointer;transition:.15s}
button:hover{background:#F9FAFB}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary{background:#4F46E5;color:#fff;border-color:#4F46E5}
button.primary:hover{background:#4338CA}
button.danger{background:#FEF2F2;color:#B91C1C;border-color:#FECACA}
button.success{background:#ECFDF5;color:#065F46;border-color:#A7F3D0}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ready   {background:#ECFDF5;color:#065F46}
.badge-dispatch{background:#EFF6FF;color:#1D4ED8}
.badge-filling {background:#FFFBEB;color:#92400E}
.badge-retired {background:#F3F4F6;color:#6B7280}
.badge-expired {background:#FEF2F2;color:#B91C1C}
.badge-red     {background:#FEF2F2;color:#B91C1C}
.badge-yellow  {background:#FFFBEB;color:#92400E}
.badge-ok      {background:#ECFDF5;color:#065F46}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:4px}
label.lbl{font-size:12px;color:#6B7280;font-weight:500}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #F3F4F6;font-size:13px}
th{background:#F9FAFB;font-weight:600;color:#374151;font-size:12px}
tr:last-child td{border-bottom:none}
.tab-nav{display:flex;gap:6px;background:#fff;padding:10px 16px;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:10}
.tab-btn{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #E5E7EB;background:transparent;color:#6B7280;font-weight:500}
.tab-btn.active{background:#4F46E5;color:#fff;border-color:#4F46E5}

.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{border-radius:10px;padding:12px 14px}
.kpi .num{font-size:26px;font-weight:700;line-height:1}
.kpi .lbl{font-size:11px;margin-top:3px;font-weight:500}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar input[type=text]{width:160px}
.fbtn{padding:4px 11px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #E5E7EB;background:#F9FAFB;color:#6B7280}
.fbtn.on{background:#EEF2FF;color:#4F46E5;border-color:#A5B4FC;font-weight:600}
.box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.box-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:12px;cursor:pointer;transition:.15s}
.box-card:hover{box-shadow:0 2px 8px #0001}
.box-card .box-id{font-family:monospace;font-size:15px;font-weight:700;color:#111}
.box-card .box-type{font-size:12px;color:#6B7280;margin-top:2px}
.box-card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.box-card .detail{margin-top:10px;border-top:1px solid #F3F4F6;padding-top:8px}
.box-card .detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #F9FAFB;font-size:12px}
.steps{display:flex;gap:6px;margin-bottom:16px}
.step{padding:5px 13px;border-radius:16px;font-size:12px;font-weight:500}
.step.active{background:#EEF2FF;color:#4F46E5}
.step.done{background:#ECFDF5;color:#065F46}
.step.todo{background:#F9FAFB;color:#9CA3AF}
.drug-table-wrap{border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;margin-bottom:12px}
.drug-row{display:grid;grid-template-columns:1fr 70px 140px 30px;gap:6px;padding:7px 10px;border-bottom:1px solid #F3F4F6;align-items:center}
.drug-row:last-child{border-bottom:none}

.sect-title{font-size:13px;font-weight:600;margin:0 0 10px;color:#374151}
.info-box{border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px}
.warn-box{background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C}
.ok-box{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46}

.settings-nav{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.snav{padding:5px 13px;border-radius:16px;font-size:13px;cursor:pointer;border:1px solid #E5E7EB;background:#F9FAFB;color:#6B7280;font-weight:500}
.snav.on{background:#EEF2FF;color:#4F46E5;border-color:#A5B4FC;font-weight:600}

.list-item:last-child{border-bottom:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:6px}

// ─── Utils ────────────────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const daysLeft = (exp) => {
  if (!exp) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(exp + 'T00:00:00') - today) / 864e5);
};
const alertLv = (d, s) => {
  if (d === null) return null;
  const red = s?.alertRed ?? 30; const yellow = s?.alertYellow ?? 90;
  return d <= 0 ? 'expired' : d <= red ? 'red' : d <= yellow ? 'yellow' : 'ok';
};

function useLS(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    });
  }, [key]);
  return [val, set];
}

// ─── Shared small components ──────────────────────────────────────────────────
function StatusBadge({status, wardName}) {
  const map = {
    ready:'badge-ready', dispatched:'badge-dispatch',
    filling:'badge-filling', retired:'badge-retired',
  };
  const lbl = {
    ready:      'พร้อมจ่าย',
    dispatched: wardName ? `📍 ${wardName}` : 'อยู่ที่ตึก',
    filling:    'เตรียมยา',
    retired:    'เลิกใช้',
  };
  return <span className={`badge ${map[status]||'badge-retired'}`}>{lbl[status]||status}</span>;
}

function AlertBadge({days, settings}) {
  if (days === null) return null;
  const lv = alertLv(days, settings);
  const labels = {expired:'หมดอายุ',red:`⚠ ${days}ว`,yellow:`⏰ ${days}ว`,ok:`✓ ${days}ว`};
  return <span className={`badge badge-${lv}`}>{labels[lv]}</span>;
}

function CatDot({color}) {
  return <span className="cat-dot" style={{background:color}}/>;
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {

  const [settings,   setSettings]   = useLS('wds_settings',   {alertRed:30, alertYellow:90, boxExpireDays:90});
  const [categories, setCategories] = useLS('wds_categories', SEED_CATEGORIES);
  const [boxTypes,   setBoxTypes]   = useLS('wds_boxTypes',   SEED_BOX_TYPES);
  const [wards,      setWards]      = useLS('wds_wards',      SEED_WARDS);
  const [staff,      setStaff]      = useLS('wds_staff',      []);
  const [boxes,      setBoxes]      = useLS('wds_boxes',      []);
  const [fills,      setFills]      = useLS('wds_fills',      []);
  const [exchanges,  setExchanges]  = useLS('wds_exchanges',  []);

  const [fillBox, setFillBox] = useState(null); // กล่องที่กำลังบรรจุ (modal)
  const openFillModal = (box) => setFillBox(box);
  const closeFillModal = () => setFillBox(null);

  const ctx = {settings,categories,boxTypes,wards,staff,boxes,fills,exchanges,
               setSettings,setCategories,setBoxTypes,setWards,setStaff,setBoxes,setFills,setExchanges,
               setTab, openFillModal};

  const TABS = [
    {id:'dashboard',label:'📊 Dashboard'},
    {id:'exchange', label:'🔄 แลกกล่อง'},
    {id:'settings', label:'⚙️ ตั้งค่า'},
  ];

  return (
    <>
      <div className="tab-nav no-print">
        <span style={{fontWeight:700,fontSize:15,marginRight:8,color:'#4F46E5'}}>🏥 BoxBox</span>
        {TABS.map(t => (
          <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`}
            onClick={() => setTab(t.id)}>{t.label}</button>
        ))}
      </div>
      <div className="page">
        {tab==='dashboard' && <DashboardTab {...ctx}/>}
        {tab==='exchange'  && <ExchangeTab  {...ctx}/>}
        {tab==='settings'  && <SettingsTab  {...ctx}/>}
      </div>
      {fillBox && (
        <FillModal
          box={fillBox} onClose={closeFillModal}
          boxes={boxes} setBoxes={setBoxes}
          fills={fills} setFills={setFills}
          exchanges={exchanges} setExchanges={setExchanges}
          boxTypes={boxTypes} wards={wards} staff={staff} settings={settings}
        />
      )}
    </>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function DashboardTab({boxes,setBoxes,fills,boxTypes,categories,wards,settings,openFillModal}) {
  const [fStatus,  setFStatus]  = useState('all');
  const [fCat,     setFCat]     = useState('all');
  const [fType,    setFType]    = useState('all');
  const [fWard,    setFWard]    = useState('all');
  const [fAlert,   setFAlert]   = useState('all');
  const [search,   setSearch]   = useState('');
  const [groupBy,  setGroupBy]  = useState('category'); // category | type | ward | none

  const enriched = boxes.map(b => {
    const fill = [...fills].filter(f=>f.boxId===b.boxId).pop();
    const type = boxTypes.find(t=>t.id===b.typeId);
    const cat  = categories.find(c=>c.id===type?.categoryId);
    const ward = wards.find(w=>w.id===b.wardId);
    let minDays = null;
    if (fill?.drugs?.length) {
      const ds = fill.drugs.map(d=>daysLeft(d.expiry)).filter(v=>v!==null);
      if (ds.length) minDays = Math.min(...ds);
    }
    return {...b, fill, type, cat, ward, minDays};
  });

  const filtered = enriched.filter(b => {
    if (fStatus!=='all' && b.status!==fStatus) return false;
    if (fCat!=='all'    && b.cat?.id!==fCat)   return false;
    if (fType!=='all'   && b.typeId!==fType)   return false;
    if (fWard!=='all'   && b.wardId!==fWard)   return false;
    if (search && !b.boxId.toLowerCase().includes(search.toLowerCase())) return false;
    if (fAlert!=='all') {
      if (b.minDays===null) return false;
      const lv = alertLv(b.minDays, settings);
      if (fAlert==='red'    && !['red','expired'].includes(lv)) return false;
      if (fAlert==='yellow' && lv!=='yellow') return false;
      if (fAlert==='ok'     && lv!=='ok')     return false;
    }
    return true;
  });

  const counts = {
    total:      boxes.length,
    ready:      boxes.filter(b=>b.status==='ready').length,
    dispatched: boxes.filter(b=>b.status==='dispatched').length,
    filling:    boxes.filter(b=>b.status==='filling').length,
    alert:      enriched.filter(b=>b.minDays!==null&&b.minDays<=settings.alertRed).length,
  };

  // Group cards
  let groups = [{key:'all', label:'', color:'', items: filtered}];
  if (groupBy==='category') {
    const catMap = {};
    filtered.forEach(b => {
      const k = b.cat?.id || 'none';
      if (!catMap[k]) catMap[k] = {key:k, label: b.cat?.name||'ไม่มีหมวด', color: b.cat?.color||'#9CA3AF', items:[]};
      catMap[k].items.push(b);
    });
    groups = Object.values(catMap);
  } else if (groupBy==='type') {
    const tm = {};
    filtered.forEach(b => {
      const k = b.typeId||'none';
      if (!tm[k]) tm[k] = {key:k, label: b.type?.name||'—', color:'#6B7280', items:[]};
      tm[k].items.push(b);
    });
    groups = Object.values(tm);
  } else if (groupBy==='ward') {
    const wm = {};
    filtered.forEach(b => {
      const k = b.wardId||'none';
      if (!wm[k]) wm[k] = {key:k, label: b.ward?.name||'ไม่ระบุตึก', color:'#6B7280', items:[]};
      wm[k].items.push(b);
    });
    groups = Object.values(wm);
  }

  const FBtn = ({v, cur, set, children}) => (
    <button className={`fbtn${cur===v?' on':''}`} onClick={()=>set(v)}>{children}</button>
  );

  return (
    <div>
      {/* KPIs — กดเพื่อ filter */}
      <div className="kpi-grid" style={{marginBottom:14}}>
        {[
          {lbl:'ทั้งหมด',    v:counts.total,      bg:'#F9FAFB', tc:'#111',     fv:'all'},
          {lbl:'พร้อมจ่าย',  v:counts.ready,      bg:'#ECFDF5', tc:'#065F46',  fv:'ready'},
          {lbl:'อยู่ที่ตึก', v:counts.dispatched, bg:'#EFF6FF', tc:'#1D4ED8',  fv:'dispatched'},
          {lbl:'เตรียมยา',   v:counts.filling,    bg:'#FFFBEB', tc:'#92400E',  fv:'filling'},
          {lbl:'⚠ วิกฤต',   v:counts.alert,      bg:'#FEF2F2', tc:'#B91C1C',  fv:'alert'},
        ].map(s=>{
          const isAlert     = s.fv==='alert';
          const isActive    = isAlert ? fAlert==='red' : fStatus===s.fv;
          const handleClick = () => {
            if (isAlert) setFAlert(fAlert==='red'?'all':'red');
            else         setFStatus(fStatus===s.fv?'all':s.fv);
          };
          return (
            <div key={s.lbl} className="kpi" onClick={handleClick}
              style={{background:isActive?s.tc:s.bg, cursor:'pointer',
                transition:'.15s', userSelect:'none',
                outline:isActive?'2px solid '+s.tc:'none', outlineOffset:2}}>
              <div className="num" style={{color:isActive?'#fff':s.tc}}>{s.v}</div>
              <div className="lbl" style={{color:isActive?'#fff':s.tc,opacity:.85}}>{s.lbl}</div>
            </div>
          );
        })}
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <input type="text" placeholder="🔍 ค้นหา Box ID" value={search}
          onChange={e=>setSearch(e.target.value)}/>
        <div className="row">
          {[['all','ทุก'],['red','⚠'],['yellow','⏰'],['ok','✓']].map(([v,l])=>
            <FBtn key={v} v={v} cur={fAlert} set={setFAlert}>{l}</FBtn>)}
        </div>
        <select value={fCat} onChange={e=>{setFCat(e.target.value);setFType('all')}}>
          <option value="all">ทุกหมวด</option>
          {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select value={fType} onChange={e=>setFType(e.target.value)}>
          <option value="all">ทุกประเภท</option>
          {boxTypes.filter(t=>fCat==='all'||t.categoryId===fCat).map(t=>
            <option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
        <select value={fWard} onChange={e=>setFWard(e.target.value)}>
          <option value="all">ทุกตึก</option>
          {wards.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
        </select>
        <div style={{marginLeft:'auto',display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontSize:11,color:'#9CA3AF'}}>จัดกลุ่ม:</span>
          {[['category','หมวด'],['type','ประเภท'],['ward','ตึก'],['none','ไม่จัด']].map(([v,l])=>
            <FBtn key={v} v={v} cur={groupBy} set={setGroupBy}>{l}</FBtn>)}
        </div>
        <span style={{fontSize:11,color:'#9CA3AF'}}>{filtered.length}/{boxes.length}</span>
      </div>

      {/* Cards grouped */}
      {filtered.length===0
        ? <div className="no-data">ไม่พบกล่องที่ตรงเงื่อนไข</div>
        : groups.map(g => (
            <div key={g.key} style={{marginBottom:20}}>
              {groupBy!=='none' && (
                <div className="group-header">
                  {g.color && <CatDot color={g.color}/>}
                  {g.label}
                  <span style={{marginLeft:4,fontWeight:400,opacity:.7}}>({g.items.length})</span>
                </div>
              )}
              <div className="box-grid">
                {g.items.map(b=><BoxCard key={b.boxId} box={b} settings={settings} wards={wards} setBoxes={setBoxes} openFillModal={openFillModal}/>)}
              </div>
            </div>
          ))}
    </div>
  );
}

function BoxMeta({box, settings}) {
  const expDays    = settings?.boxExpireDays || 90;
  const fillDate   = box.fill?.filledAt ? new Date(box.fill.filledAt) : null;
  const boxExpDate = fillDate ? new Date(fillDate.getTime() + expDays*864e5) : null;
  const boxDaysLeft= boxExpDate ? Math.round((boxExpDate - new Date())/864e5) : null;
  const expStr     = boxExpDate
    ? boxExpDate.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'})
    : null;
  const lvColor = boxDaysLeft===null ? null
    : boxDaysLeft<=0                          ? {bg:'#FEF2F2',tc:'#B91C1C'}
    : boxDaysLeft<=(settings?.alertRed||30)   ? {bg:'#FEF2F2',tc:'#B91C1C'}
    : boxDaysLeft<=(settings?.alertYellow||90) ? {bg:'#FFFBEB',tc:'#92400E'}
    : {bg:'#ECFDF5',tc:'#065F46'};
  const daysLabel = boxDaysLeft===null ? null
    : boxDaysLeft<=0 ? 'หมดอายุแล้ว' : 'เหลือ '+boxDaysLeft+' ว';
  return (
    <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:8}}>
      <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
        {box.cat && (
          <span style={{fontSize:11,background:box.cat.color+'20',color:box.cat.color,
            padding:'2px 7px',borderRadius:10,fontWeight:600,flexShrink:0}}>
            {box.cat.name}
          </span>
        )}
        <span style={{fontSize:11,background:'#F3F4F6',color:'#374151',
          padding:'2px 7px',borderRadius:10,fontWeight:500,flexShrink:0}}>
          {'📦 '+(box.type?.name||'—')}
        </span>
      </div>
      {expStr && lvColor ? (
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <span style={{fontSize:11,background:'#F3F4F6',color:'#6B7280',
            padding:'2px 7px',borderRadius:10,flexShrink:0}}>
            {'หมดอายุ '+expStr}
          </span>
          <span style={{fontSize:11,background:lvColor.bg,color:lvColor.tc,
            padding:'2px 7px',borderRadius:10,fontWeight:600,flexShrink:0}}>
            {daysLabel}
          </span>
        </div>
      ) : (
        <span style={{fontSize:11,color:'#9CA3AF'}}>ยังไม่ได้บรรจุ</span>
      )}
    </div>
  );
}

function BoxCard({box, settings, wards, setBoxes, openFillModal}) {
  const [open,    setOpen]    = useState(false);
  const [menu,    setMenu]    = useState(false);   // ... dropdown
  const [wardPop, setWardPop] = useState(false);   // ส่งไปตึก popup
  const [selWard, setSelWard] = useState('');
  const menuRef = useRef(null);

  // ปิด menu เมื่อคลิกนอก
  useEffect(()=>{
    if (!menu) return;
    const handler = (e)=>{ if(menuRef.current&&!menuRef.current.contains(e.target)) setMenu(false); };
    document.addEventListener('mousedown', handler);
    return ()=>document.removeEventListener('mousedown', handler);
  },[menu]);

  const borderColor = box.minDays===null ? '#E5E7EB'
    : box.minDays <= settings.alertRed    ? '#FECACA'
    : box.minDays <= settings.alertYellow ? '#FDE68A'
    : '#E5E7EB';
  const bgAlert = box.minDays!==null && box.minDays <= settings.alertRed ? '#FFFAFA' : '#fff';

  const setFilling = (e) => {
    e.stopPropagation(); setMenu(false);
    // เปลี่ยนสถานะ แล้วเปิด modal บรรจุยาทันที
    const updatedBox = {...box, status:'filling'};
    setBoxes(p=>p.map(b=>b.boxId===box.boxId?{...b,status:'filling'}:b));
    openFillModal(updatedBox);
  };

  const openWardPop = (e) => {
    e.stopPropagation(); setMenu(false); setSelWard(box.wardId||''); setWardPop(true);
  };

  const confirmDispatch = (e) => {
    e.stopPropagation();
    if (!selWard) return;
    setBoxes(p=>p.map(b=>b.boxId===box.boxId?{...b,status:'dispatched',wardId:selWard}:b));
    setWardPop(false);
  };

  return (
    <div className="box-card" style={{borderColor,background:bgAlert,position:'relative'}}
      onClick={()=>{ if(!menu&&!wardPop) setOpen(!open); }}>

      {/* Header row */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div className="box-id">{box.boxId}</div>
          <div className="box-type">{box.type?.name||'—'}</div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <StatusBadge status={box.status} wardName={box.ward?.name}/>
          {/* ⋯ menu button */}
          <div ref={menuRef} style={{position:'relative'}}>
            <button
              onClick={e=>{e.stopPropagation();setMenu(m=>!m);setWardPop(false);}}
              style={{background:'none',border:'1px solid #E5E7EB',borderRadius:6,
                width:26,height:26,cursor:'pointer',fontSize:16,lineHeight:1,
                color:'#6B7280',display:'flex',alignItems:'center',justifyContent:'center',
                padding:0,flexShrink:0}}
              title="ตัวเลือก">⋯</button>

            {menu && (
              <div style={{position:'absolute',right:0,top:30,background:'#fff',
                border:'1px solid #E5E7EB',borderRadius:10,boxShadow:'0 4px 16px #0001',
                zIndex:50,minWidth:160,overflow:'hidden'}}>
                <div style={{padding:'4px 0'}}>
                  {/* เตรียมยาใหม่ */}
                  <button onClick={setFilling}
                    style={{display:'block',width:'100%',textAlign:'left',
                      padding:'9px 14px',border:'none',background:'none',cursor:'pointer',
                      fontSize:13,color:'#374151'}}
                    onMouseEnter={e=>e.target.style.background='#F9FAFB'}
                    onMouseLeave={e=>e.target.style.background='none'}>
                    📦 เตรียมยาใหม่
                  </button>
                  {/* ส่งไปตึก */}
                  <button onClick={openWardPop}
                    style={{display:'block',width:'100%',textAlign:'left',
                      padding:'9px 14px',border:'none',background:'none',cursor:'pointer',
                      fontSize:13,color:'#374151'}}
                    onMouseEnter={e=>e.target.style.background='#F9FAFB'}
                    onMouseLeave={e=>e.target.style.background='none'}>
                    📍 ส่งไปตึก…
                  </button>
                  <div style={{height:1,background:'#F3F4F6',margin:'2px 0'}}/>
                  {/* เปลี่ยนสถานะอื่น */}
                  {[
                    ['ready',    '✓ พร้อมจ่าย'],
                    ['retired',  '🗑 เลิกใช้'],
                  ].filter(([v])=>v!==box.status).map(([v,l])=>(
                    <button key={v}
                      onClick={e=>{e.stopPropagation();setMenu(false);
                        setBoxes(p=>p.map(b=>b.boxId===box.boxId?{...b,status:v}:b));}}
                      style={{display:'block',width:'100%',textAlign:'left',
                        padding:'9px 14px',border:'none',background:'none',cursor:'pointer',
                        fontSize:13,color: v==='retired'?'#B91C1C':'#374151'}}
                      onMouseEnter={e=>e.target.style.background='#F9FAFB'}
                      onMouseLeave={e=>e.target.style.background='none'}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Ward dispatch popup */}
      {wardPop && (
        <div onClick={e=>e.stopPropagation()}
          style={{position:'absolute',right:0,top:60,background:'#fff',
            border:'1px solid #A5B4FC',borderRadius:10,boxShadow:'0 4px 20px #0002',
            zIndex:60,width:220,padding:'12px 14px'}}>
          <p style={{fontWeight:600,fontSize:13,margin:'0 0 8px',color:'#374151'}}>📍 ส่งไปตึก</p>
          <select value={selWard} onChange={e=>setSelWard(e.target.value)}
            style={{width:'100%',marginBottom:10,padding:'6px 8px',borderRadius:8,
              border:'1px solid #D1D5DB',fontSize:13}}>
            <option value="">— เลือกตึก —</option>
            {(wards||[]).map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
          </select>
          <div style={{display:'flex',gap:6}}>
            <button onClick={e=>{e.stopPropagation();setWardPop(false);}}
              style={{flex:1,padding:'6px 0',borderRadius:8,fontSize:12}}>ยกเลิก</button>
            <button onClick={confirmDispatch} disabled={!selWard}
              style={{flex:1,padding:'6px 0',borderRadius:8,fontSize:12,
                background:'#4F46E5',color:'#fff',border:'none',cursor:'pointer',
                opacity:selWard?1:.4}}>ส่ง</button>
          </div>
        </div>
      )}

      {/* Meta — ประเภทกล่อง | วันหมดอายุกล่อง | เหลืออีก */}
      <BoxMeta box={box} settings={settings}/>
      {box.fill && (
        <div style={{fontSize:11,color:'#9CA3AF',marginTop:6}}>
          บรรจุ: {box.fill.filledBy}
          {box.fill.checkedBy && <span style={{color:'#065F46'}}> · ✓ {box.fill.checkedBy}</span>}
        </div>
      )}
      {open && box.fill && (
        <div className="detail">
          {box.fill.drugs.map((d,i)=>{
            const dl = daysLeft(d.expiry);
            return (
              <div key={i} className="detail-row">
                <span>{d.name}</span>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <span style={{color:'#6B7280'}}>×{d.qty}</span>
                  <span style={{color:'#9CA3AF',fontSize:11}}>{d.expiry}</span>
                  {dl!==null && <AlertBadge days={dl} settings={settings}/>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {box.fill && (
        <div style={{fontSize:11,color:'#9CA3AF',marginTop:6,textAlign:'right'}}>
          {open ? '▲' : '▼ ดูยา'}
        </div>
      )}
    </div>
  );
}

// ─── Fill Tab ─────────────────────────────────────────────────────────────────
// ─── Fill Modal (เรียกจาก BoxCard ⋯ menu) ───────────────────────────────────
function FillModal({box, onClose, boxes, setBoxes, fills, setFills,
                    exchanges, setExchanges, boxTypes, wards, staff, settings}) {
  const [step,        setStep]        = useState(1);
  const [drugs,       setDrugs]       = useState([]);
  const [filledBy,    setFilledBy]    = useState('');
  const [dispBoxId,   setDispBoxId]   = useState('');
  const [checkedBy,   setCheckedBy]   = useState('');
  const [savedFillId, setSavedFillId] = useState(null);

  const technicians = staff.filter(s=>s.role==='tech');
  const pharmacists = staff.filter(s=>s.role==='pharmacist');
  const type        = boxTypes.find(t=>t.id===box.typeId);
  const fromWard    = wards.find(w=>w.id===box.wardId);
  const dispCandidates = boxes.filter(b=>b.typeId===box.typeId&&b.status==='ready'&&b.boxId!==box.boxId);

  // โหลด drugs พร้อม default expiry จากครั้งก่อน
  useEffect(()=>{
    const sameTypeBoxIds = boxes.filter(b=>b.typeId===box.typeId).map(b=>b.boxId);
    const prevFills = [...fills]
      .filter(f=>sameTypeBoxIds.includes(f.boxId))
      .sort((a,b)=>new Date(b.filledAt)-new Date(a.filledAt));
    const lastExpiry = {};
    prevFills.filter(f=>f.boxId===box.boxId).forEach(f=>
      f.drugs?.forEach(d=>{ if(d.name&&d.expiry&&!lastExpiry[d.name]) lastExpiry[d.name]=d.expiry; }));
    prevFills.filter(f=>f.boxId!==box.boxId).forEach(f=>
      f.drugs?.forEach(d=>{ if(d.name&&d.expiry&&!lastExpiry[d.name]) lastExpiry[d.name]=d.expiry; }));
    setDrugs((type?.drugs||[]).map(d=>({
      name:d.name, qty:d.stdQty,
      expiry:lastExpiry[d.name]||'', prefilled:!!lastExpiry[d.name],
    })));
  },[]);

  const updDrug = (i,f,v) => setDrugs(p=>p.map((d,idx)=>{
    if(idx!==i) return d;
    const extra = f==='expiry'?{prefilled:false}:{};
    return {...d,[f]:v,...extra};
  }));
  const addDrug = () => setDrugs(p=>[...p,{name:'',qty:1,expiry:'',prefilled:false}]);
  const delDrug = (i) => setDrugs(p=>p.filter((_,idx)=>idx!==i));

  const saveAll = () => {
    const fillId = uid();
    const exchId = uid();
    setFills(p=>[...p,{fillId,boxId:box.boxId,drugs,filledBy,checkedBy:'',filledAt:new Date().toISOString()}]);
    if (dispBoxId) {
      setExchanges(p=>[...p,{id:exchId,returnBoxId:box.boxId,dispatchBoxId:dispBoxId,wardId:box.wardId,by:filledBy,at:new Date().toISOString()}]);
    }
    setBoxes(p=>p.map(b=>{
      if(b.boxId===box.boxId)  return {...b,status:'ready',currentFillId:fillId};
      if(b.boxId===dispBoxId)  return {...b,status:'dispatched',wardId:box.wardId};
      return b;
    }));
    setSavedFillId(fillId);
    setStep(3);
  };

  const confirmCheck = () => {
    setFills(p=>p.map(f=>f.fillId===savedFillId?{...f,checkedBy,checkedAt:new Date().toISOString()}:f));
    onClose();
  };

  const handlePrint = () => {
    const expDays   = settings?.boxExpireDays||90;
    const fillDate  = new Date();
    const boxExpDate= new Date(fillDate.getTime()+expDays*864e5);
    const fmt       = d=>d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
    const fmtLong   = d=>d.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
    const drugRows  = drugs.map((d,i)=>`<tr><td style="text-align:center">${i+1}</td><td>${d.name}</td><td style="text-align:center">${d.qty}</td><td style="text-align:center">${d.expiry||'—'}</td></tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>
      @page{margin:14mm 18mm}body{font-family:'Segoe UI',sans-serif;font-size:13px}
      .hdr{background:#EEF2FF;border:1.5px solid #A5B4FC;border-radius:8px;padding:14px 18px;margin-bottom:12px}
      .hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
      .box-id{font-size:26px;font-weight:900;color:#4338CA;font-family:monospace}
      .box-type{font-size:14px;font-weight:700;color:#4F46E5;margin-top:3px}
      .exp-box{background:#FEF2F2;border:2px solid #FECACA;border-radius:8px;padding:10px 16px;text-align:center;min-width:160px}
      .exp-lbl{font-size:10px;color:#B91C1C;font-weight:800;text-transform:uppercase;margin-bottom:3px}
      .exp-val{font-size:16px;font-weight:900;color:#B91C1C}
      .exp-sub{font-size:10px;color:#9CA3AF;margin-top:2px}
      .meta-row{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
      .meta-item{font-size:12px;color:#555}.meta-item b{color:#111}
      table{width:100%;border-collapse:collapse;margin-bottom:20px}
      thead tr{background:#4F46E5}th{padding:8px 10px;font-size:11px;font-weight:700;color:#fff;border:1px solid #4338CA;text-align:center}
      th:nth-child(2){text-align:left}td{padding:7px 10px;border:1px solid #D1D5DB;font-size:12px;text-align:center}
      td:nth-child(2){text-align:left}tr:nth-child(even) td{background:#F9FAFB}
      .foot{display:flex;justify-content:space-between;gap:20px;margin-top:16px}
      .sig{flex:1;text-align:center}.sig .line{border-top:1.5px solid #333;margin-top:52px;margin-bottom:6px}
      .sig .name{font-size:12px;color:#555;margin:0;line-height:1.5}
    </style></head><body>
      <div class="hdr">
        <div class="hdr-top">
          <div><div class="box-id">${box.boxId}</div><div class="box-type">${type?.name||'—'}</div></div>
          <div class="exp-box">
            <div class="exp-lbl">กล่องหมดอายุ</div>
            <div class="exp-val">${fmt(boxExpDate)}</div>
            <div class="exp-sub">${expDays} วันจากวันบรรจุ</div>
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-item">📅 วันที่บรรจุ: <b>${fmtLong(fillDate)}</b></div>
          <div class="meta-item">👤 ผู้เตรียมยา: <b>${filledBy}</b></div>
          ${fromWard?'<div class="meta-item">📍 ตึก: <b>'+fromWard.name+'</b></div>':''}
        </div>
      </div>
      ${dispBoxId?'<div style="background:#F0FDF4;border:1px solid #A7F3D0;border-radius:6px;padding:8px 12px;font-size:12px;color:#065F46;margin-bottom:12px">📦 ทดแทนกล่อง <b>'+dispBoxId+'</b> → ตึก <b>'+(fromWard?.name||'—')+'</b></div>':''}
      <table><thead><tr><th style="width:36px">#</th><th>รายการยา</th><th style="width:64px">จำนวน</th><th style="width:110px">วันหมดอายุ</th></tr></thead>
      <tbody>${drugRows}</tbody></table>
      <div class="foot">
        <div class="sig"><div class="line"></div><p class="name">ผู้เตรียมยา<br/>${filledBy}</p></div>
        <div class="sig"><div class="line"></div><p class="name">เภสัชกรผู้ตรวจสอบ</p></div>
      </div>
    </body></html>`;
    const w=window.open('','_blank','width=780,height=760');
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}
  };

  const canNext = filledBy && drugs.length>0 && drugs.every(d=>d.name&&d.expiry);

  // ── overlay backdrop ──
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,
      display:'flex',alignItems:'flex-start',justifyContent:'center',overflowY:'auto',padding:'32px 16px'}}
      onClick={e=>{if(e.target===e.currentTarget) onClose();}}>
      <div style={{background:'#fff',borderRadius:16,width:'100%',maxWidth:660,
        boxShadow:'0 8px 40px rgba(0,0,0,.18)',position:'relative'}}>

        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid #E5E7EB',
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <span style={{fontFamily:'monospace',fontWeight:700,fontSize:17,color:'#4F46E5'}}>
              {box.boxId}
            </span>
            <span style={{marginLeft:10,fontSize:13,color:'#6B7280'}}>{type?.name}</span>
            {fromWard&&<span style={{marginLeft:8,fontSize:12,color:'#4F46E5',fontWeight:500}}>📍 {fromWard.name}</span>}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,
            cursor:'pointer',color:'#9CA3AF',lineHeight:1,padding:'0 4px'}}>×</button>
        </div>

        <div style={{padding:'16px 20px'}}>
          {/* Step bar */}
          <div className="steps" style={{marginBottom:16}}>
            {['เตรียมยา','เลือกกล่องแทน','พิมพ์/ยืนยัน'].map((s,i)=>(
              <span key={i} className={'step '+(step===i+1?'active':step>i+1?'done':'todo')}>
                {i+1}. {s}
              </span>
            ))}
          </div>

          {/* Step 1: drug table */}
          {step===1 && (
            <div>
              <div className="col" style={{marginBottom:12}}>
                <label className="lbl">ผู้เตรียมยา (ผู้ช่วยเภสัชกร)</label>
                {technicians.length>0
                  ? <select value={filledBy} onChange={e=>setFilledBy(e.target.value)} style={{width:'100%'}}>
                      <option value="">— เลือก —</option>
                      {technicians.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
                    </select>
                  : <input value={filledBy} onChange={e=>setFilledBy(e.target.value)}
                      placeholder="ชื่อผู้เตรียมยา" style={{width:'100%'}}/>
                }
              </div>
              <div className="drug-table-wrap">
                <div className="drug-header">
                  <span>รายการยา</span><span>จำนวน</span><span>วันหมดอายุ</span><span/>
                </div>
                {drugs.map((d,i)=>{
                  const isNear = d.expiry&&daysLeft(d.expiry)<=30;
                  return (
                    <div key={i} className="drug-row"
                      style={{background:d.prefilled&&d.expiry?'#FFFBEB':undefined}}>
                      <input value={d.name} onChange={e=>updDrug(i,'name',e.target.value)} style={{fontSize:12}}/>
                      <input type="number" min={1} value={d.qty}
                        onChange={e=>updDrug(i,'qty',+e.target.value)}
                        style={{fontSize:12,textAlign:'center'}}/>
                      <div style={{display:'flex',gap:4,alignItems:'center'}}>
                        <input type="date" value={d.expiry} onChange={e=>updDrug(i,'expiry',e.target.value)}
                          style={{fontSize:12,flex:1,
                            borderColor:isNear?'#FECACA':d.prefilled&&d.expiry?'#FDE68A':undefined,
                            background:d.prefilled&&d.expiry?'#FFFBEB':undefined}}/>
                        {d.prefilled&&d.expiry&&<span title="ค่าจากการบรรจุครั้งก่อน" style={{fontSize:13}}>🕐</span>}
                      </div>
                      <button onClick={()=>delDrug(i)}
                        style={{color:'#B91C1C',background:'none',border:'none',fontSize:18,lineHeight:1,cursor:'pointer'}}>×</button>
                    </div>
                  );
                })}
              </div>
              {drugs.some(d=>d.prefilled&&d.expiry)&&(
                <div style={{fontSize:11,color:'#92400E',marginTop:6,padding:'3px 8px',
                  background:'#FFFBEB',borderRadius:6,display:'inline-block'}}>
                  🕐 = ค่าจากการบรรจุครั้งก่อน — ตรวจสอบก่อนบันทึก
                </div>
              )}
              <div className="row" style={{marginTop:10}}>
                <button onClick={addDrug}>+ เพิ่มรายการ</button>
                <button className="primary" style={{marginLeft:'auto'}}
                  onClick={()=>setStep(2)} disabled={!canNext}>ถัดไป →</button>
              </div>
            </div>
          )}

          {/* Step 2: dispatch box */}
          {step===2 && (
            <div>
              <div style={{background:'#EEF2FF',border:'1px solid #A5B4FC',borderRadius:10,
                padding:'12px 16px',marginBottom:14}}>
                <p style={{fontSize:12,fontWeight:600,color:'#4338CA',margin:'0 0 6px'}}>📦 Flow การส่งกล่อง</p>
                <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,flexWrap:'wrap'}}>
                  <span style={{fontFamily:'monospace',fontWeight:700,color:'#4F46E5'}}>{box.boxId}</span>
                  <span style={{color:'#6B7280'}}>บรรจุเสร็จ → พร้อมจ่าย</span>
                  {fromWard&&<><span style={{color:'#9CA3AF'}}>·</span>
                    <span style={{fontFamily:'monospace',fontWeight:700,color:dispBoxId?'#065F46':'#9CA3AF'}}>
                      {dispBoxId||'???'}
                    </span>
                    <span style={{color:'#6B7280'}}>→ ส่งไปตึก</span>
                    <span style={{fontWeight:600,color:'#4F46E5'}}>{fromWard.name}</span>
                  </>}
                </div>
              </div>

              {fromWard ? (
                <div className="col" style={{marginBottom:14}}>
                  <label className="lbl">
                    กล่องที่ส่งไปแทน → ตึก <b style={{color:'#4F46E5'}}>{fromWard.name}</b>
                    <span style={{marginLeft:8,fontWeight:400,color:'#9CA3AF'}}>(optional)</span>
                  </label>
                  {dispCandidates.length===0
                    ? <div className="info-box warn-box">⚠️ ไม่มีกล่องประเภทเดียวกันพร้อมจ่าย</div>
                    : <div style={{display:'flex',flexDirection:'column',gap:6}}>
                        {dispCandidates.map(b=>{
                          const fill = [...fills].filter(f=>f.boxId===b.boxId).pop();
                          const md = fill?.drugs?.length
                            ? Math.min(...fill.drugs.map(d=>daysLeft(d.expiry)).filter(v=>v!==null))
                            : null;
                          return (
                            <div key={b.boxId} onClick={()=>setDispBoxId(dispBoxId===b.boxId?'':b.boxId)}
                              style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                                padding:'10px 14px',borderRadius:10,cursor:'pointer',
                                border:'2px solid '+(dispBoxId===b.boxId?'#4F46E5':'#E5E7EB'),
                                background:dispBoxId===b.boxId?'#EEF2FF':'#fff',transition:'.15s'}}>
                              <div>
                                <code style={{fontFamily:'monospace',fontWeight:700,fontSize:14,
                                  color:dispBoxId===b.boxId?'#4F46E5':'#111'}}>{b.boxId}</code>
                                {fill?.checkedBy&&<span style={{fontSize:11,color:'#065F46',marginLeft:8}}>✓ ตรวจสอบแล้ว</span>}
                              </div>
                              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                                {md!==null&&<AlertBadge days={md} settings={settings}/>}
                                {dispBoxId===b.boxId&&<span style={{color:'#4F46E5',fontWeight:700,fontSize:16}}>✓</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                  }
                </div>
              ) : (
                <p style={{fontSize:13,color:'#6B7280',marginBottom:14}}>
                  กล่องนี้ไม่ได้มาจากตึก — จะบรรจุเป็นกล่องสำรองพร้อมจ่ายโดยตรง
                </p>
              )}

              <div className="row">
                <button onClick={()=>setStep(1)}>← ย้อนกลับ</button>
                <button className="primary" style={{marginLeft:'auto'}} onClick={saveAll}>
                  ✓ บันทึก
                </button>
              </div>
            </div>
          )}

          {/* Step 3: print + confirm */}
          {step===3 && (
            <div>
              <div className="info-box ok-box" style={{marginBottom:14}}>
                <strong>✅ บันทึกเรียบร้อย — กล่อง {box.boxId} พร้อมจ่าย</strong>
                {dispBoxId&&fromWard&&(
                  <div style={{marginTop:4,fontSize:12}}>
                    กล่อง <code>{dispBoxId}</code> ส่งออกไปตึก <b>{fromWard.name}</b>
                  </div>
                )}
              </div>
              <button onClick={handlePrint} style={{marginBottom:16}}>🖨️ พิมพ์ label</button>
              <div style={{borderTop:'1px solid #E5E7EB',paddingTop:14}}>
                <p className="sect-title" style={{marginBottom:10}}>เภสัชกรตรวจสอบ label</p>
                <div className="row">
                  <div className="col" style={{flex:1}}>
                    <label className="lbl">ชื่อเภสัชกร</label>
                    {pharmacists.length>0
                      ? <select value={checkedBy} onChange={e=>setCheckedBy(e.target.value)} style={{width:'100%'}}>
                          <option value="">— เลือก —</option>
                          {pharmacists.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
                        </select>
                      : <input value={checkedBy} onChange={e=>setCheckedBy(e.target.value)}
                          placeholder="ชื่อเภสัชกร" style={{width:'100%'}}/>
                    }
                  </div>
                  <button className="success" onClick={confirmCheck} disabled={!checkedBy}
                    style={{marginTop:18}}>✓ ยืนยัน</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Exchange Tab ─────────────────────────────────────────────────────────────
function ExchangeTab({boxes,setBoxes,exchanges,setExchanges,wards,boxTypes}) {
  const [view,        setView]        = useState('form');
  const [selWard,     setSelWard]     = useState('');
  const [returnBoxId, setReturnBoxId] = useState('');
  const [dispBoxId,   setDispBoxId]   = useState('');
  const [by,          setBy]          = useState('');
  const [done,        setDone]        = useState(null);

  const returnCandidates = selWard
    ? boxes.filter(b=>b.wardId===selWard&&b.status==='dispatched') : [];
  const returnBox = boxes.find(b=>b.boxId===returnBoxId);
  const dispCandidates = returnBox
    ? boxes.filter(b=>b.typeId===returnBox.typeId&&b.status==='ready') : [];

  const doExchange = () => {
    const id = uid();
    setExchanges(p=>[...p,{id,returnBoxId,dispatchBoxId:dispBoxId,wardId:selWard,by,at:new Date().toISOString()}]);
    setBoxes(p=>p.map(b=>{
      if (b.boxId===returnBoxId) return {...b,status:'filling'};
      if (b.boxId===dispBoxId)   return {...b,status:'dispatched',wardId:selWard};
      return b;
    }));
    const wd = wards.find(w=>w.id===selWard);
    setDone({ward:wd?.name, returnBoxId, dispBoxId, by});
    setSelWard(''); setReturnBoxId(''); setDispBoxId(''); setBy('');
  };

  const canSubmit = selWard && returnBoxId && dispBoxId && by;

  return (
    <div style={{maxWidth:560}}>
      <div className="row" style={{marginBottom:14}}>
        {[['form','แลกกล่อง'],['log','ประวัติ']].map(([v,l])=>(
          <button key={v} className={`tab-btn${view===v?' active':''}`}
            style={{padding:'5px 14px'}} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>

      {view==='form' && (
        done ? (
          <div className="info-box ok-box">
            <strong>✅ แลกกล่องเรียบร้อย</strong>
            <div style={{marginTop:8,fontSize:13}}>
              <div>ตึก: <strong>{done.ward}</strong></div>
              <div>รับกลับ: <code>{done.returnBoxId}</code> → สถานะ "เตรียมยา"</div>
              <div>จ่ายออก: <code>{done.dispBoxId}</code> → ไปที่ตึก</div>
              <div style={{fontSize:12,marginTop:4}}>โดย: {done.by}</div>
            </div>
            <button style={{marginTop:10}} onClick={()=>setDone(null)}>แลกกล่องต่อ</button>
          </div>
        ) : (
          <div className="card">
            <p className="sect-title" style={{marginBottom:14}}>บันทึกการแลกกล่อง</p>

            <div className="col" style={{marginBottom:12}}>
              <label className="lbl">ตึก / Ward ที่มาแลก</label>
              <select value={selWard}
                onChange={e=>{setSelWard(e.target.value);setReturnBoxId('');setDispBoxId('');}}>
                <option value="">— เลือกตึก —</option>
                {wards.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
              </select>
            </div>

            {selWard && (
              <div className="col" style={{marginBottom:12}}>
                <label className="lbl">กล่องที่รับกลับ (จากตึก)</label>
                {returnCandidates.length===0
                  ? <div className="info-box warn-box">
                      ⚠️ ไม่พบกล่องที่จ่ายให้ตึกนี้ในระบบ
                    </div>
                  : <select value={returnBoxId}
                      onChange={e=>{setReturnBoxId(e.target.value);setDispBoxId('');}}>
                      <option value="">— เลือกกล่องที่รับกลับ —</option>
                      {returnCandidates.map(b=>{
                        const t = boxTypes.find(x=>x.id===b.typeId);
                        return <option key={b.boxId} value={b.boxId}>{b.boxId} ({t?.name})</option>;
                      })}
                    </select>
                }
              </div>
            )}

            {returnBoxId && (
              <div className="col" style={{marginBottom:12}}>
                <label className="lbl">กล่องที่จ่ายออก (พร้อมจ่าย)</label>
                {dispCandidates.length===0
                  ? <div className="info-box warn-box">
                      ⚠️ ไม่มีกล่องประเภทเดียวกันพร้อมจ่าย — ต้องเตรียมยาใหม่ก่อน
                    </div>
                  : <select value={dispBoxId} onChange={e=>setDispBoxId(e.target.value)}>
                      <option value="">— เลือกกล่องที่จ่าย —</option>
                      {dispCandidates.map(b=><option key={b.boxId} value={b.boxId}>{b.boxId}</option>)}
                    </select>
                }
              </div>
            )}

            <div className="col" style={{marginBottom:16}}>
              <label className="lbl">ผู้ดำเนินการ</label>
              <input value={by} onChange={e=>setBy(e.target.value)} placeholder="ชื่อผู้ช่วยเภสัชกร"/>
            </div>

            <button className="primary" style={{width:'100%',padding:10}}
              onClick={doExchange} disabled={!canSubmit}>
              ✓ บันทึกการแลกกล่อง
            </button>
          </div>
        )
      )}

      {view==='log' && (
        exchanges.length===0
          ? <div className="no-data">ยังไม่มีประวัติ</div>
          : [...exchanges].reverse().map(ex=>{
              const ward = wards.find(w=>w.id===ex.wardId);
              return (
                <div key={ex.id} className="card" style={{marginBottom:8}}>
                  <div className="row" style={{justifyContent:'space-between',marginBottom:4}}>
                    <strong>📍 {ward?.name||'—'}</strong>
                    <span style={{fontSize:11,color:'#9CA3AF'}}>{ex.at?.slice(0,16).replace('T',' ')}</span>
                  </div>
                  <div style={{fontSize:12,color:'#6B7280'}}>
                    รับกลับ: <code>{ex.returnBoxId}</code> → จ่ายออก: <code>{ex.dispatchBoxId}</code>
                  </div>
                  <div style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>โดย: {ex.by}</div>
                </div>
              );
            })
      )}
    </div>
  );
}

  const SECS = [['boxes','กล่องยา'],['types','ประเภทกล่อง'],['categories','หมวดหมู่'],
                ['wards','ตึก/Ward'],['staff','เจ้าหน้าที่'],['alert','แจ้งเตือน']];
  return (
    <div style={{maxWidth:700}}>
      <div className="settings-nav">
        {SECS.map(([v,l])=>(
          <button key={v} className={`snav${sec===v?' on':''}`} onClick={()=>setSec(v)}>{l}</button>
        ))}

      {sec==='boxes'      && <BoxesSection      {...props}/>}
      {sec==='types'      && <TypesSection      {...props}/>}

// ── TypeSelect ── top-level เพื่อป้องกัน re-mount ทุก render
function BulkCreateButton({preview, boxes, bulk, addBulk}) {
  const newCount = preview.filter(id=>!boxes.find(b=>b.boxId===id)).length;
  const skipCount = preview.length - newCount;
  const label = '⚡ สร้าง '+newCount+' กล่องใหม่'+(skipCount>0?' (ข้าม '+skipCount+' ซ้ำ)':'');
  return (
    <button className="primary" onClick={addBulk}
      disabled={!bulk.typeId||newCount===0}>
      {label}
    </button>
  );
}

function TypeSelect({value, onChange, categories, boxTypes}) {
  return (
    <select value={value} onChange={onChange}>
      <option value="">— เลือก —</option>
      {categories.map(c=>(
        <optgroup key={c.id} label={c.name}>
          {boxTypes.filter(t=>t.categoryId===c.id).map(t=>
            <option key={t.id} value={t.id}>{t.name}</option>)}
        </optgroup>
      ))}
      {boxTypes.filter(t=>!t.categoryId).map(t=>
        <option key={t.id} value={t.id}>{t.name}</option>)}
    </select>
  );
}

function BoxesSection({boxes,setBoxes,boxTypes,categories,wards}) {
  const [mode,    setMode]    = useState('single'); // 'single' | 'bulk'
  // single
  const [form, setForm] = useState({boxId:'',typeId:'',wardId:''});
  const sf = (k,v) => setForm(p=>({...p,[k]:v}));
  // bulk
  const [bulk, setBulk] = useState({prefix:'CPR',startNum:1,count:3,digits:2,typeId:'',wardId:''});
  const sb = (k,v) => setBulk(p=>({...p,[k]:v}));
  const [preview,  setPreview]  = useState([]);
  const [bulkDone, setBulkDone] = useState(null);

  // generate preview IDs
  const genPreview = (b) => {
    const arr = [];
    for (let i=0; i<b.count; i++) {
      const n = String(b.startNum + i).padStart(b.digits, '0');
      arr.push(`${b.prefix}-${n}`);
    }
    return arr;
  };

  useEffect(() => {
    if (mode==='bulk') setPreview(genPreview(bulk));
  }, [bulk, mode]);

  // single add
  const addSingle = () => {
    if (!form.boxId||!form.typeId) return;
    if (boxes.find(b=>b.boxId===form.boxId)) { alert('Box ID นี้มีอยู่แล้ว'); return; }
    setBoxes(p=>[...p,{...form,status:'filling',currentFillId:null}]);
    setForm({boxId:'',typeId:'',wardId:''});
  };

  // bulk add
  const addBulk = () => {
    if (!bulk.typeId) return;
    const ids    = genPreview(bulk);
    const newIds = ids.filter(id => !boxes.find(b=>b.boxId===id)); // ข้ามที่ซ้ำ
    if (newIds.length === 0) { alert('ทุก ID ซ้ำกับที่มีอยู่แล้ว ไม่มีกล่องใหม่'); return; }
    const newBoxes = newIds.map(id=>({boxId:id,typeId:bulk.typeId,wardId:bulk.wardId,status:'filling',currentFillId:null}));
    setBoxes(p=>[...p,...newBoxes]);
    setBulkDone({created:newIds, skipped:ids.filter(id=>boxes.find(b=>b.boxId===id))});
    setBulk(p=>({...p,startNum:p.startNum+p.count}));
  };

  const changeStatus = (id,st) => setBoxes(p=>p.map(b=>b.boxId===id?{...b,status:st}:b));
  const remove = (id) => { if(confirm(`ลบกล่อง ${id}?`)) setBoxes(p=>p.filter(b=>b.boxId!==id)); };
  const removeAll = () => { if(confirm(`ลบกล่องทั้งหมด ${boxes.length} กล่อง?`)) setBoxes([]); };

  return (
    <div>
      {/* Mode toggle */}
      <div className="row" style={{marginBottom:12}}>
        {[['single','สร้างทีละกล่อง'],['bulk','สร้างทีเดียวหลายกล่อง']].map(([v,l])=>(
          <button key={v} className={`tab-btn${mode===v?' active':''}`}
            style={{padding:'5px 14px'}} onClick={()=>{setMode(v);setBulkDone(null);}}>
            {v==='bulk'?'⚡ ':''}{l}
          </button>
        ))}
      </div>

      {/* ── Single ── */}
      {mode==='single' && (
        <div className="card" style={{marginBottom:14}}>
          <p className="sect-title" style={{marginBottom:10}}>สร้างกล่องใหม่</p>
          <div className="row">
            <div className="col">
              <label className="lbl">Box ID</label>
              <input value={form.boxId} onChange={e=>sf('boxId',e.target.value.toUpperCase())}
                placeholder="CPR-01" style={{width:110,fontFamily:'monospace'}}/>
            </div>
            <div className="col">
              <label className="lbl">ประเภท</label>
              <TypeSelect value={form.typeId} onChange={e=>sf('typeId',e.target.value)} categories={categories} boxTypes={boxTypes}/>
            </div>
            <div className="col">
              <label className="lbl">ตึก (optional)</label>
              <select value={form.wardId} onChange={e=>sf('wardId',e.target.value)}>
                <option value="">— ไม่ระบุ —</option>
                {wards.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
              </select>
            </div>
            <button className="primary" style={{marginTop:16}} onClick={addSingle}
              disabled={!form.boxId||!form.typeId}>+ สร้าง</button>
          </div>
        </div>
      )}

      {/* ── Bulk ── */}
      {mode==='bulk' && (
        <div className="card" style={{marginBottom:14}}>
          <p className="sect-title" style={{marginBottom:12}}>⚡ สร้างหลายกล่องพร้อมกัน</p>

          <div className="row" style={{marginBottom:12,flexWrap:'wrap',gap:12}}>
            {/* Prefix */}
            <div className="col">
              <label className="lbl">Prefix</label>
              <input value={bulk.prefix} onChange={e=>sb('prefix',e.target.value.toUpperCase())}
                placeholder="CPR" style={{width:90,fontFamily:'monospace',fontWeight:700}}/>
            </div>
            {/* Start number */}
            <div className="col">
              <label className="lbl">เริ่มที่เลข</label>
              <input type="number" min={1} value={bulk.startNum}
                onChange={e=>sb('startNum',Math.max(1,+e.target.value))}
                style={{width:72,textAlign:'center'}}/>
            </div>
            {/* Count */}
            <div className="col">
              <label className="lbl">จำนวนกล่อง</label>
              <input type="number" min={1} max={99} value={bulk.count}
                onChange={e=>sb('count',Math.min(99,Math.max(1,+e.target.value)))}
                style={{width:72,textAlign:'center'}}/>
            </div>
            {/* Digits */}
            <div className="col">
              <label className="lbl">หลัก (zero-pad)</label>
              <select value={bulk.digits} onChange={e=>sb('digits',+e.target.value)} style={{width:72}}>
                {[1,2,3].map(n=><option key={n} value={n}>{n} หลัก</option>)}
              </select>
            </div>
            {/* Type */}
            <div className="col">
              <label className="lbl">ประเภท</label>
              <TypeSelect value={bulk.typeId} onChange={e=>sb('typeId',e.target.value)} categories={categories} boxTypes={boxTypes}/>
            </div>
            {/* Ward */}
            <div className="col">
              <label className="lbl">ตึก (optional)</label>
              <select value={bulk.wardId} onChange={e=>sb('wardId',e.target.value)}>
                <option value="">— ไม่ระบุ —</option>
                {wards.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
              </select>
            </div>
          </div>

          {/* Preview */}
          <div style={{background:'#F9FAFB',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
            <p style={{fontSize:11,color:'#6B7280',fontWeight:600,marginBottom:6}}>
              Preview — จะสร้าง {preview.length} กล่อง:
            </p>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {preview.map(id=>{
                const dup = !!boxes.find(b=>b.boxId===id);
                return (
                  <span key={id} style={{
                    fontFamily:'monospace',fontSize:13,fontWeight:700,
                    padding:'3px 9px',borderRadius:8,
                    background: dup ? '#FEF2F2' : '#EEF2FF',
                    color:      dup ? '#B91C1C' : '#4F46E5',
                    border:     `1px solid ${dup?'#FECACA':'#A5B4FC'}`,
                  }}>
                    {id}{dup?' ⚠':''}
                  </span>
                );
              })}
            </div>
            {preview.some(id=>boxes.find(b=>b.boxId===id)) && (
              <p style={{fontSize:11,color:'#B91C1C',marginTop:6}}>
                ⚠ ID สีแดงซ้ำกับที่มีอยู่แล้ว — จะถูกข้ามอัตโนมัติ สร้างเฉพาะที่ไม่ซ้ำ
              </p>
            )}
          </div>

          {/* Result banner */}
          {bulkDone && (
            <div className="info-box ok-box" style={{marginBottom:12}}>
              ✅ สร้างแล้ว {bulkDone.created.length} กล่อง: <b>{bulkDone.created.join(', ')}</b>
              {bulkDone.skipped.length>0 && (
                <span style={{color:'#B45309'}}><br/>ข้าม {bulkDone.skipped.length} ID ซ้ำ: {bulkDone.skipped.join(', ')}</span>
              )}
              <br/>
              <span style={{fontSize:12,color:'#065F46'}}>ครั้งต่อไปจะเริ่มที่ {bulk.prefix}-{String(bulk.startNum).padStart(bulk.digits,'0')}</span>
            </div>
          )}

          <div className="row">
            <BulkCreateButton preview={preview} boxes={boxes} bulk={bulk} addBulk={addBulk}/>
          </div>
        </div>
      )}

      <div className="card">
        <div className="row" style={{marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:600,color:'#374151'}}>
            กล่องทั้งหมด ({boxes.length})
          </span>
          {boxes.length>0 && (
            <button className="danger" style={{marginLeft:'auto',fontSize:12}}
              onClick={removeAll}>🗑 ลบทั้งหมด</button>
          )}
        </div>
        <table>
          <thead><tr>
            <th>Box ID</th><th>ประเภท</th><th>หมวด</th><th>ตึก</th><th>สถานะ</th><th/>
          </tr></thead>
          <tbody>
            {boxes.length===0
              ? <tr><td colSpan={6} style={{textAlign:'center',color:'#9CA3AF',padding:24}}>ยังไม่มีกล่อง</td></tr>
              : boxes.map(b=>{
                  const type = boxTypes.find(t=>t.id===b.typeId);
                  const cat  = categories.find(c=>c.id===type?.categoryId);
                  const ward = wards.find(w=>w.id===b.wardId);
                  return (
                    <tr key={b.boxId}>
                      <td><code style={{fontWeight:700}}>{b.boxId}</code></td>
                      <td style={{fontSize:12}}>{type?.name||'—'}</td>
                      <td>
                        {cat && <span style={{background:cat.color+'20',color:cat.color,
                          padding:'2px 7px',borderRadius:10,fontSize:11,fontWeight:600}}>
                          {cat.name}</span>}
                      </td>
                      <td style={{fontSize:12}}>{ward?.name||'—'}</td>
                      <td>
                        <select value={b.status} onChange={e=>changeStatus(b.boxId,e.target.value)}
                          style={{fontSize:12,padding:'3px 6px'}}>
                          <option value="filling">เตรียมยา</option>
                          <option value="ready">พร้อมจ่าย</option>
                          <option value="dispatched">อยู่ที่ตึก</option>
                          <option value="retired">เลิกใช้</option>
                        </select>
                      </td>
                      <td>
                        <button onClick={()=>remove(b.boxId)}
                          style={{color:'#B91C1C',background:'none',border:'none',cursor:'pointer',fontSize:12}}>ลบ</button>
                      </td>
                    </tr>
                  );
                })
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}

function TypesSection({boxTypes,setBoxTypes,categories}) {
  const [sel,     setSel]     = useState(null);
  const [newName, setNewName] = useState('');
  const [newCat,  setNewCat]  = useState('');

  const addType = () => {
    if (!newName) return;
    const t = {id:uid(),name:newName,categoryId:newCat||null,drugs:[]};
    setBoxTypes(p=>[...p,t]); setSel(t.id); setNewName(''); setNewCat('');
  };
  const delType = (id) => {setBoxTypes(p=>p.filter(t=>t.id!==id));if(sel===id)setSel(null);};
  const updName = (id,v) => setBoxTypes(p=>p.map(t=>t.id===id?{...t,name:v}:t));
  const updCat  = (id,v) => setBoxTypes(p=>p.map(t=>t.id===id?{...t,categoryId:v||null}:t));
  const addDrug = (tid)  => setBoxTypes(p=>p.map(t=>t.id===tid?{...t,drugs:[...t.drugs,{name:'',stdQty:1}]}:t));
  const updDrug = (tid,i,f,v) => setBoxTypes(p=>p.map(t=>t.id===tid?{...t,drugs:t.drugs.map((d,idx)=>idx===i?{...d,[f]:v}:d)}:t));
  const delDrug = (tid,i) => setBoxTypes(p=>p.map(t=>t.id===tid?{...t,drugs:t.drugs.filter((_,idx)=>idx!==i)}:t));

  const selType = boxTypes.find(t=>t.id===sel);

  return (
    <div>
      <div className="row" style={{marginBottom:12}}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="ชื่อประเภทกล่องใหม่" style={{flex:1}}/>
        <select value={newCat} onChange={e=>setNewCat(e.target.value)}>
          <option value="">— หมวดหมู่ —</option>
          {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <button className="primary" onClick={addType} disabled={!newName}>+ เพิ่ม</button>
      </div>

      <div style={{display:'flex',gap:12}}>
        <div style={{width:170,flexShrink:0}}>
          {categories.map(c=>{
            const types = boxTypes.filter(t=>t.categoryId===c.id);
            if (!types.length) return null;
            return (
              <div key={c.id} style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:c.color,marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>{c.name}</div>
                {types.map(t=>(
                  <div key={t.id} onClick={()=>setSel(t.id)}
                    style={{padding:'6px 10px',borderRadius:8,marginBottom:3,cursor:'pointer',fontSize:13,
                      background:sel===t.id?'#EEF2FF':'#F9FAFB',
                      color:sel===t.id?'#4F46E5':'#374151',
                      fontWeight:sel===t.id?600:400}}>
                    {t.name}
                  </div>
                ))}
              </div>
            );
          })}
          {boxTypes.filter(t=>!t.categoryId).map(t=>(
            <div key={t.id} onClick={()=>setSel(t.id)}
              style={{padding:'6px 10px',borderRadius:8,marginBottom:3,cursor:'pointer',fontSize:13,
                background:sel===t.id?'#EEF2FF':'#F9FAFB',
                color:sel===t.id?'#4F46E5':'#374151'}}>
              {t.name}
            </div>
          ))}
        </div>

        {selType && (
          <div className="card" style={{flex:1}}>
            <div className="row" style={{marginBottom:12}}>
              <input value={selType.name} onChange={e=>updName(sel,e.target.value)} style={{flex:1,fontWeight:600}}/>
              <select value={selType.categoryId||''} onChange={e=>updCat(sel,e.target.value)}>
                <option value="">— ไม่มีหมวด —</option>
                {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <button className="danger" onClick={()=>delType(sel)}>ลบ</button>
            </div>
            <div className="drug-table-wrap">
              <div className="drug-header" style={{gridTemplateColumns:'1fr 70px 30px'}}>
                <span>รายการยา</span><span>จำนวน std</span><span/>
              </div>
              {selType.drugs.map((d,i)=>(
                <div key={i} className="drug-row" style={{gridTemplateColumns:'1fr 70px 30px'}}>
                  <input value={d.name} onChange={e=>updDrug(sel,i,'name',e.target.value)} style={{fontSize:12}}/>
                  <input type="number" value={d.stdQty} min={1}
                    onChange={e=>updDrug(sel,i,'stdQty',+e.target.value)}
                    style={{fontSize:12,textAlign:'center'}}/>
                  <button onClick={()=>delDrug(sel,i)}
                    style={{color:'#B91C1C',background:'none',border:'none',fontSize:18,lineHeight:1,cursor:'pointer'}}>×</button>
                </div>
              ))}
            </div>
            <button style={{marginTop:8}} onClick={()=>addDrug(sel)}>+ เพิ่มยา</button>
          </div>
        )}
      </div>
    </div>
  );
}

function CategoriesSection({categories,setCategories}) {
  const [form, setForm] = useState({name:'',color:'#4F46E5'});
  const add = () => {
    if (!form.name) return;
    setCategories(p=>[...p,{id:uid(),...form}]);
    setForm({name:'',color:'#4F46E5'});
  };
  const remove = (id) => setCategories(p=>p.filter(c=>c.id!==id));
  const updColor = (id,v) => setCategories(p=>p.map(c=>c.id===id?{...c,color:v}:c));
  const updName  = (id,v) => setCategories(p=>p.map(c=>c.id===id?{...c,name:v}:c));

  return (
    <div>
      <div className="row" style={{marginBottom:12}}>
        <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
          placeholder="ชื่อหมวดหมู่ เช่น CPR / สูติกรรม" style={{flex:1}}/>
        <input type="color" value={form.color} onChange={e=>setForm(p=>({...p,color:e.target.value}))}
          style={{width:36,height:36,padding:2,border:'1px solid #D1D5DB',borderRadius:8,cursor:'pointer'}}/>
        <button className="primary" onClick={add} disabled={!form.name}>+ เพิ่ม</button>
      </div>
      <div className="card">
        {categories.map(c=>(
          <div key={c.id} className="list-item">
            <div className="row">
              <input type="color" value={c.color} onChange={e=>updColor(c.id,e.target.value)}
                style={{width:28,height:28,padding:2,border:'1px solid #E5E7EB',borderRadius:6,cursor:'pointer'}}/>
              <input value={c.name} onChange={e=>updName(c.id,e.target.value)}
                style={{border:'none',fontWeight:500,fontSize:13,background:'none',padding:0,outline:'none',width:200}}/>
            </div>
            <button onClick={()=>remove(c.id)}
              style={{color:'#B91C1C',background:'none',border:'none',cursor:'pointer',fontSize:12}}>ลบ</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function WardsSection({wards,setWards}) {
  const [name,setName] = useState('');
  const add    = () => {if(!name)return; setWards(p=>[...p,{id:uid(),name}]); setName('');};
  const remove = (id) => setWards(p=>p.filter(w=>w.id!==id));
  return (
    <div>
      <div className="row" style={{marginBottom:12}}>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="ชื่อตึก / Ward" style={{flex:1}}/>
        <button className="primary" onClick={add} disabled={!name}>+ เพิ่ม</button>
      </div>
      <div className="card">
        {wards.map(w=>(
          <div key={w.id} className="list-item">
            <span style={{fontSize:13}}>{w.name}</span>
            <button onClick={()=>remove(w.id)}
              style={{color:'#B91C1C',background:'none',border:'none',cursor:'pointer',fontSize:12}}>ลบ</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function StaffSection({staff,setStaff}) {
  const [form,setForm] = useState({name:'',role:'tech'});
  const add    = () => {if(!form.name)return; setStaff(p=>[...p,{id:uid(),...form}]); setForm({name:'',role:'tech'});};
  const remove = (id) => setStaff(p=>p.filter(s=>s.id!==id));
  return (
    <div>
      <div className="row" style={{marginBottom:12}}>
        <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
          placeholder="ชื่อ-นามสกุล" style={{flex:1,minWidth:160}}/>
        <select value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}>
          <option value="tech">ผู้ช่วยเภสัชกร</option>
          <option value="pharmacist">เภสัชกร</option>
        </select>
        <button className="primary" onClick={add} disabled={!form.name}>+ เพิ่ม</button>
      </div>
      <div className="card">
        {staff.map(s=>(
          <div key={s.id} className="list-item">
            <span style={{fontSize:13,fontWeight:500}}>{s.name}</span>
            <div className="row">
              <span style={{fontSize:11,background:'#F3F4F6',color:'#6B7280',padding:'2px 8px',borderRadius:8}}>
                {s.role==='pharmacist'?'เภสัชกร':'ผู้ช่วยฯ'}
              </span>
              <button onClick={()=>remove(s.id)}
                style={{color:'#B91C1C',background:'none',border:'none',cursor:'pointer',fontSize:12}}>ลบ</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AlertSection({settings,setSettings}) {
  return (
    <div style={{maxWidth:440}}>
      <div className="card">
        <p className="sect-title" style={{marginBottom:14}}>เกณฑ์แจ้งเตือนยาใกล้หมดอายุ</p>
        {[
          {key:'alertRed',   label:'⚠ วิกฤต',  bg:'#FEF2F2',tc:'#B91C1C'},
          {key:'alertYellow',label:'⏰ เตือน',  bg:'#FFFBEB',tc:'#92400E'},
        ].map(s=>(
          <div key={s.key} className="row" style={{marginBottom:12}}>
            <span style={{background:s.bg,color:s.tc,padding:'4px 12px',borderRadius:10,
              fontSize:12,fontWeight:600,width:90,textAlign:'center'}}>{s.label}</span>
            <span style={{fontSize:13,color:'#6B7280'}}>น้อยกว่า</span>
            <input type="number" value={settings[s.key]} min={1} max={365}
              onChange={e=>setSettings(p=>({...p,[s.key]:+e.target.value}))}
              style={{width:70,textAlign:'center',fontSize:16,fontWeight:700}}/>
            <span style={{fontSize:13,color:'#6B7280'}}>วัน</span>
          </div>
        ))}
        <div style={{borderTop:'1px solid #F3F4F6',marginTop:8,paddingTop:14}}>
          <p style={{fontSize:13,fontWeight:600,color:'#374151',marginBottom:10}}>
            🖨️ อายุกล่องยา (สำหรับพิมพ์ label)
          </p>
          <div className="row" style={{marginBottom:4}}>
            <span style={{background:'#EEF2FF',color:'#4F46E5',padding:'4px 12px',borderRadius:10,
              fontSize:12,fontWeight:600,width:90,textAlign:'center'}}>กล่องหมดอายุ</span>
            <span style={{fontSize:13,color:'#6B7280'}}>หลังจากวันบรรจุ</span>
            <input type="number" value={settings.boxExpireDays||90} min={1} max={365}
              onChange={e=>setSettings(p=>({...p,boxExpireDays:+e.target.value}))}
              style={{width:70,textAlign:'center',fontSize:16,fontWeight:700}}/>
            <span style={{fontSize:13,color:'#6B7280'}}>วัน</span>
          </div>
          <p style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>
            ค่าปัจจุบัน: กล่องหมดอายุหลังบรรจุ {settings.boxExpireDays||90} วัน · วิกฤต &lt;{settings.alertRed}ว · เตือน &lt;{settings.alertYellow}ว
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
